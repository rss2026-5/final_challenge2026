trajectory_planner:
  ros__parameters:
    odom_topic: "/pf/pose/odom"
    map_topic: "/map"

trajectory_follower:
  ros__parameters:
    odom_topic: "/pf/pose/odom"
    drive_topic: "/vesc/high_level/input/nav_2"

safety_controller:
  ros__parameters:
    scan_topic: "/scan"
    safety_topic: "/vesc/low_level/input/safety"

overall_controller:
  ros__parameters:
    odom_topic: "/pf/pose/odom"
    drive_topic: "/vesc/high_level/input/nav_2"
    goal_arrival_threshold: 0.8
    parking_duration: 5.0
    detection_window: 3.0
    startup_delay_sec: 5.0
    auto_return_to_start: true
    #[x, y, yaw, ...] waypoints, followed by saved start pose
    return_waypoints: [
      -53.0,   34.0,    0.0,    #up west-side hallway
      -54.76,  -0.51,   0.0,    #around the bottom corner
    ]

object_detector:
  ros__parameters:
    camera_topic: "/zed/zed_node/rgb/image_rect_color"
    # Lowered from 0.5: parking meters are flat cardboard cutouts at floor
    # level, so YOLO's confidence is lower than for the 3D meters in COCO
    # training. Persistence bumped to 4 to suppress the resulting false
    # positives.
    conf_threshold: 0.3
    persistence_frames: 4

traffic_light_detector:
  ros__parameters:
    camera_topic: "/zed/zed_node/rgb/image_rect_color"
    # Light is mounted on a short pedestal (~30cm), so from the car it
    # appears in the lower-middle of the frame, not the upper.
    roi_top_fraction: 0.3
    roi_bottom_fraction: 0.9

# Drives the last ~1m to the meter. The TA-published goal pose has
# hand-placement error, so we close the loop on the actual meter
# position (homography-projected from object_detector).
parking_approach:
  ros__parameters:
    drive_topic: "/vesc/high_level/input/nav_2"
    stop_distance: 1.0
    stop_tolerance: 0.15
    stop_hold_sec: 0.4
    max_speed: 0.7
    min_speed: 0.25
    slow_distance: 1.8
