trajectory_planner:
  ros__parameters:
    odom_topic: "/pf/pose/odom"
    map_topic: "/map"

trajectory_follower:
  ros__parameters:
    odom_topic: "/pf/pose/odom"
    drive_topic: "/vesc/input/navigation"

safety_controller:
  ros__parameters:
    scan_topic: "/scan"
    safety_topic: "/vesc/low_level/input/safety"

overall_controller:
  ros__parameters:
    odom_topic: "/pf/pose/odom"
    drive_topic: "/vesc/input/navigation"
    goal_arrival_threshold: 1.0
    parking_duration: 5.0
    detection_window: 3.0
    startup_delay_sec: 5.0
    auto_return_to_start: true
    #[x, y, yaw, ...] waypoints, followed by saved start pose
    return_waypoints: [
      -53.0,   34.0,    0.0,    #up west-side hallway
      -54.76,  -0.51,   0.0,    #around the bottom corner
    ]

object_detector:
  ros__parameters:
    camera_topic: "/zed/rgb/image_rect_color"

traffic_light_detector:
  ros__parameters:
    camera_topic: "/zed/rgb/image_rect_color"
